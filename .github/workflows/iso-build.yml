name: Build SukunaOS ISO

on:
  push:
    branches: [ main ]
    paths:
      - 'live/**'
      - 'scripts/build_iso.sh'
      - 'src/**'
      - '.github/workflows/iso-build.yml'
  pull_request:
    branches: [ main ]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build squashfs-tools xorriso debootstrap rsync

      - name: Make scripts executable
        run: sudo chmod +x scripts/*.sh || true

      - name: Build ISO
        run: |
          sudo bash scripts/build_iso.sh
          ls -lh live/sukunaos.iso

      - name: Verify ISO
        run: |
          file live/sukunaos.iso
          ls -lh live/sukunaos.iso | awk '{print "ISO size: " $5}'

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: sukunaos-iso
          path: live/sukunaos.iso
          retention-days: 30
