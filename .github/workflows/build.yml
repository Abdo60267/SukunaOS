name: Build SukunaOS ISO
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Latest Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools xorriso debootstrap rsync git make gettext isolinux syslinux-common mtools dosfstools grub-pc-bin grub-efi-amd64-bin live-boot
          sudo apt-get remove -y live-build
          git clone https://salsa.debian.org/live-team/live-build.git
          cd live-build
          sudo make install MANPAGES=false
          cd ..

      - name: Build ISO
        run: |
          chmod +x scripts/*.sh || true
          sudo bash scripts/build_iso.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: sukunaos-iso
          path: live-build/*.iso
