name: Build SukunaOS ISO
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build squashfs-tools xorriso debootstrap rsync

      - name: Run Build Script as Root
        run: |
          chmod +x scripts/*.sh || true
          # Forçamos o sudo aqui para englobar todo o processo de uma vez
          sudo bash scripts/build_iso.sh

      - name: Upload Finished ISO
        uses: actions/upload-artifact@v4
        with:
          name: sukunaos-iso
          path: live-build/*.iso
