<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">SukunaOS Cleave wallpaper</title>
  <desc id="desc">A dark technical wallpaper with cursed slash cuts, security seals, and red-gold energy.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040202"/>
      <stop offset="46%" stop-color="#130507"/>
      <stop offset="100%" stop-color="#050203"/>
    </linearGradient>
    <linearGradient id="slashRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d0307" stop-opacity="0"/>
      <stop offset="42%" stop-color="#d71927" stop-opacity="0.9"/>
      <stop offset="58%" stop-color="#e6b84d" stop-opacity="0.86"/>
      <stop offset="100%" stop-color="#3d0307" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d71927" stop-opacity="0.62"/>
      <stop offset="55%" stop-color="#5e0710" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#030202" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <ellipse cx="960" cy="540" rx="610" ry="360" fill="url(#core)"/>

  <g opacity="0.22">
    <path d="M0 96h1920M0 216h1920M0 336h1920M0 456h1920M0 576h1920M0 696h1920M0 816h1920M0 936h1920" stroke="#331014" stroke-width="2"/>
    <path d="M120 0v1080M360 0v1080M600 0v1080M840 0v1080M1080 0v1080M1320 0v1080M1560 0v1080M1800 0v1080" stroke="#271014" stroke-width="2"/>
  </g>

  <g stroke="url(#slashRed)" stroke-linecap="round" filter="url(#soft)">
    <path d="M120 310h760" stroke-width="22" transform="rotate(-13 500 310)"/>
    <path d="M790 240h980" stroke-width="18" transform="rotate(14 1280 240)"/>
    <path d="M270 740h690" stroke-width="16" transform="rotate(10 615 740)"/>
    <path d="M890 720h810" stroke-width="22" transform="rotate(-12 1295 720)"/>
  </g>

  <g transform="translate(960 536)" opacity="0.9">
    <circle r="228" fill="none" stroke="#501217" stroke-width="4"/>
    <circle r="164" fill="none" stroke="#a62622" stroke-width="2"/>
    <circle r="92" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.74"/>

    <g stroke="#d4af37" stroke-width="3" stroke-linecap="round" opacity="0.7">
      <path d="M0 -260v84"/>
      <path d="M0 176v84"/>
      <path d="M-260 0h84"/>
      <path d="M176 0h84"/>
      <path d="M-184 -184l58 58"/>
      <path d="M184 -184l-58 58"/>
      <path d="M-184 184l58-58"/>
      <path d="M184 184l-58-58"/>
    </g>

    <path d="M-62 -76h124l-19 58 24 96h-134l24-96z" fill="#070203" stroke="#d4af37" stroke-width="3" stroke-linejoin="round"/>
    <path d="M-38 -34h76M-44 20h88" stroke="#b30d18" stroke-width="9" stroke-linecap="round"/>
  </g>

  <g fill="#b99c84" font-family="Segoe UI, Arial, sans-serif" opacity="0.82">
    <text x="86" y="904" font-size="18" letter-spacing="3">CLEAVE GUARD: ACTIVE</text>
    <text x="86" y="936" font-size="18" letter-spacing="3">DISMANTLE SCAN: WATCHING</text>
    <text x="86" y="968" font-size="18" letter-spacing="3">KING OF CURSES LSM: SEALED</text>
  </g>

  <text x="1740" y="982" fill="#e6b84d" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" text-anchor="end">SukunaOS</text>
</svg>
