<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">SukunaOS crest</title>
  <desc id="desc">An original dark crest with cursed marks, gold seals, and slash shapes for SukunaOS.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="44%" r="62%">
      <stop offset="0%" stop-color="#b30d18" stop-opacity="0.72"/>
      <stop offset="54%" stop-color="#3b080d" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#050203" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe08a"/>
      <stop offset="45%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#7f5614"/>
    </linearGradient>
    <linearGradient id="blood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#570207"/>
      <stop offset="52%" stop-color="#c81422"/>
      <stop offset="100%" stop-color="#6d0209"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="240" height="240" rx="28" fill="#050203"/>
  <rect x="9" y="9" width="222" height="222" rx="23" fill="url(#glow)" stroke="#2e0a0d" stroke-width="2"/>
  <circle cx="120" cy="108" r="76" fill="none" stroke="#5a1518" stroke-width="2"/>
  <circle cx="120" cy="108" r="54" fill="none" stroke="#9d2721" stroke-width="1.4" opacity="0.75"/>

  <g opacity="0.46">
    <path d="M40 60h160M31 92h178M34 126h172M51 160h138" stroke="#2d0b0e" stroke-width="2"/>
    <path d="M52 38l39 156M188 46l-44 150" stroke="#371014" stroke-width="2"/>
  </g>

  <g filter="url(#softGlow)">
    <path d="M70 176h100l-15-78 11-39H74l11 39z" fill="#090304" stroke="url(#gold)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M92 58l-11 38h78l-11-38z" fill="#130608" stroke="#6e1719" stroke-width="2"/>
    <path d="M86 118h68M93 143h54" stroke="url(#blood)" stroke-width="7" stroke-linecap="round"/>
    <path d="M95 80h50" stroke="url(#gold)" stroke-width="5" stroke-linecap="round" opacity="0.78"/>
  </g>

  <g fill="none" stroke="url(#blood)" stroke-linecap="round" filter="url(#softGlow)">
    <path d="M49 77l50-13" stroke-width="7"/>
    <path d="M141 64l50 13" stroke-width="7"/>
    <path d="M51 142l47 11" stroke-width="6"/>
    <path d="M142 153l47-11" stroke-width="6"/>
  </g>

  <g fill="#d4af37">
    <circle cx="78" cy="112" r="3.5"/>
    <circle cx="162" cy="112" r="3.5"/>
    <circle cx="120" cy="39" r="3"/>
    <circle cx="120" cy="177" r="3"/>
  </g>

  <path d="M34 204h172" stroke="#2f0b0e" stroke-width="1"/>
  <text x="120" y="222" fill="#e6b84d" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">SukunaOS</text>
</svg>
