# SukunaOS GNOME Theme Configuration
# Install with: bash install_gnome_theme.sh

[Desktop Entry]
Type=Xfce Theme

# Theme name
Name=SukunaOS Crimson

# Descriptions
Comment=Malevolent Domain Edition - Crimson & Mac styled theme
Comment[pt]=Edição do Domínio Malevolente - Tema Carmesim & estilo Mac

# Colors
Inherits=Adwaita-dark

# Custom CSS
file={HOME}/.config/gtk-3.0/gtk.css

[GTK]
gtk-application-prefer-dark-theme=true
gtk-theme-name=Adwaita-dark
gtk-icon-theme-name=Adwaita
gtk-font-name=Inter 11
gtk-key-theme-name=Default

# Window Manager
[Xfwm4]
Title Font=Inter Medium 11
Button Layout=O|HMC
Show Shadows=true
Workspace Count=4
